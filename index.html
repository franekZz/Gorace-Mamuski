<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorące Mamuśki - Home</title>
    <style>
        :root {
            --bg-color: #1a000d;
            --text-color: #ff66cc;
            --input-bg: #2b0016;
            --border-color: #ff3399;
            --output-color: #ffffff;
        }

        .light-mode {
            --bg-color: #fff0f5;
            --text-color: #d10069;
            --input-bg: #ffe6f0;
            --border-color: #ff66b2;
            --output-color: #4b0026;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            transition: background 0.5s;
        }

        /* --- STRONA GŁÓWNA --- */
        #home-page {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: radial-gradient(circle, #2b0016 0%, #1a000d 100%);
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 20px var(--border-color);
            margin-bottom: 20px;
        }

        .start-btn {
            background: transparent;
            border: 3px solid var(--border-color);
            color: var(--text-color);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 0 15px var(--border-color);
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        .start-btn:hover {
            background: var(--border-color);
            color: #ffffff;
            box-shadow: 0 0 30px var(--border-color);
            transform: scale(1.1);
        }

        /* --- TERMINAL (UKRYTY NA START) --- */
        #terminal-container {
            display: none; /* Ukryty na początku */
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #terminal {
            border: 2px solid var(--border-color);
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 0 20px var(--border-color);
            margin-bottom: 10px;
        }

        .line { margin-bottom: 5px; }
        .command-output { color: var(--output-color); margin-bottom: 10px; text-shadow: 0 0 5px var(--text-color); font-weight: bold; }
        .ai-output { color: #00ffff; font-style: italic; margin-bottom: 10px; }
        .virus-output { color: #ff0000; font-weight: bold; }
        .success-output { color: #00ff00; font-weight: bold; }
        
        .input-area {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .prefix { margin-right: 10px; font-weight: bold; }

        input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); }
    </style>
</head>
<body>

    <div id="home-page">
        <h1>GORĄCE MAMUŚKI</h1>
        <p>Witaj w systemie PINK TERMINAL FOR FUN v1.9.0</p>
        <button class="start-btn" onclick="openTerminal()">Otwórz terminal</button>
    </div>

    <div id="terminal-container">
        <div id="terminal">
            <div class="line">=== GORĄCE MAMUŚKI PINK TERMINAL FOR FUN v1.9.0 ===</div>
            <div class="line">Status: System zabezpieczony przez Gorący Antivirus.</div>
            <div class="line">Wpisz 'help', aby zobaczyć listę funkcji.</div>
            <br>
        </div>

        <div class="input-area">
            <span class="prefix">admin@pink-dev:></span>
            <input type="text" id="commandInput" autocomplete="off">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const terminal = document.getElementById('terminal');
        const homePage = document.getElementById('home-page');
        const terminalContainer = document.getElementById('terminal-container');

        // Funkcja otwierająca terminal
        function openTerminal() {
            homePage.style.display = 'none';
            terminalContainer.style.display = 'flex';
            input.focus(); // Od razu ustawia kursor w polu tekstowym
        }

        const franekUrl = "franekzz.github.io/Gorace-Cheatuszki-Oluszki/";
        const localCheatPage = "cheaty.html";

        function getAIResponse(userMsg) {
            const msg = userMsg.toLowerCase();
            if (msg.includes("hej") || msg.includes("cześć")) return "Hej! Tu Twój różowy asystent AI.";
            if (msg.includes("co tam")) return "Skanuję sieć w poszukiwaniu przygód!";
            return "Interesujące... Powiedz mi o tym więcej.";
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const fullCmd = input.value.trim();
                const cmdLower = fullCmd.toLowerCase();

                printToTerminal(`admin@pink-dev:> ${fullCmd}`, 'line');

                if (cmdLower === 'antivirus y') {
                    printToTerminal("[!] Gorący Antivirus (FREE): Wykryto 4 zagrożenia!", "virus-output");
                    printToTerminal("[>] Kup wersję PRO wpisując: Antivirus pro y", "command-output");
                }
                else if (cmdLower === 'antivirus pro y') {
                    printToTerminal("[+] Gorący Antivirus PRO: Rozpoczynam skanowanie...", "success-output");
                    setTimeout(() => {
                        printToTerminal("... Skanowanie ...", "line");
                        printToTerminal("... Usuwanie wirusów ... [DONE]", "line");
                        printToTerminal("[OK] System bezpieczny!", "success-output");
                    }, 1500);
                }
                else if (cmdLower === 'clear') {
                    terminal.innerHTML = '';
                } 
                else if (cmdLower.startsWith('chat ')) {
                    const args = fullCmd.substring(5);
                    printToTerminal(`[Gorący Chat AI]: ${getAIResponse(args)}`, 'ai-output');
                }
                else if (cmdLower === 'jasny') {
                    document.body.classList.add('light-mode');
                    printToTerminal("Tryb jasny aktywny!", "command-output");
                }
                else if (cmdLower === 'ciemny') {
                    document.body.classList.remove('light-mode');
                    printToTerminal("Tryb ciemny aktywny!", "command-output");
                }
                else if (cmdLower === 'zegar') {
                    printToTerminal(`CZAS: ${new Date().toLocaleTimeString('pl-PL')}`, 'command-output');
                }
                else if (cmdLower === 'cheaty') {
                    printToTerminal(`Przekierowanie...`, 'command-output');
                    setTimeout(() => { window.location.href = localCheatPage; }, 1000);
                } 
                else if (cmdLower === 'help') {
                    printToTerminal('Komendy: help, cheaty, cheaty 2, scan, zegar, clear, jasny, ciemny, chat [tekst], Antivirus y', 'command-output');
                }
                else if (fullCmd !== '') {
                    printToTerminal(`Błąd: '${fullCmd}' nieznany.`, 'line');
                }

                input.value = '';
                terminal.scrollTop = terminal.scrollHeight;
            }
        });

        function printToTerminal(text, className) {
            const div = document.createElement('div');
            div.className = className;
            div.innerText = text;
            terminal.appendChild(div);
        }
    </script>
</body>
</html>
