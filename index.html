<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorące Mamuśki - System</title>
    <style>
        :root {
            --bg-color: #1a000d;
            --text-color: #ff66cc;
            --input-bg: #2b0016;
            --border-color: #ff3399;
            --output-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden;
        }

        /* --- MENU ZAKŁADEK --- */
        #nav-bar {
            display: none; /* Ukryte dopóki nie otworzysz terminala */
            background: #2b0016;
            border-bottom: 2px solid var(--border-color);
            display: none;
            justify-content: flex-start;
        }

        .tab-btn {
            background: transparent; border: none;
            color: var(--text-color); padding: 15px 25px;
            cursor: pointer; font-family: inherit; font-weight: bold;
            transition: 0.3s; border-right: 1px solid var(--border-color);
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--border-color); color: white;
        }

        /* --- STRONA GŁÓWNA --- */
        #home-page {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; text-align: center;
        }

        .start-btn {
            background: transparent; border: 3px solid var(--border-color);
            color: var(--text-color); padding: 15px 40px; font-size: 1.5rem;
            cursor: pointer; box-shadow: 0 0 15px var(--border-color);
        }

        /* --- KONTENERY TREŚCI --- */
        .content-section {
            display: none; height: calc(100vh - 52px);
            padding: 20px; box-sizing: border-box;
            flex-direction: column;
        }

        /* TERMINAL STYLE */
        #terminal {
            border: 2px solid var(--border-color); flex-grow: 1;
            padding: 15px; overflow-y: auto; background: rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .input-area {
            display: flex; background: var(--input-bg);
            padding: 10px; border: 1px solid var(--border-color);
        }

        input {
            background: transparent; border: none; color: var(--text-color);
            font-family: inherit; font-size: 16px; outline: none; flex-grow: 1;
        }

        /* ELEKTRO INFO STYLE */
        .info-card {
            border: 2px solid var(--border-color);
            padding: 30px; background: rgba(255, 102, 204, 0.05);
            max-width: 600px; margin: 0 auto;
        }

        .info-line { margin: 15px 0; font-size: 1.2rem; border-bottom: 1px solid #4d0026; }
    </style>
</head>
<body>

    <div id="home-page">
        <h1>GORĄCE MAMUŚKI</h1>
        <button class="start-btn" onclick="initSystem()">Otwórz terminal</button>
    </div>

    <div id="nav-bar">
        <button class="tab-btn active" onclick="showSection('terminal-section', this)">TERMINAL</button>
        <button class="tab-btn" onclick="showSection('elektro-section', this)">ELEKTRO-INFO</button>
        <button class="tab-btn" onclick="window.location.href='cheaty.html'">CHEATY</button>
    </div>

    <div id="terminal-section" class="content-section">
        <div id="terminal">
            <div style="color:white">=== GORĄCE MAMUŚKI PINK TERMINAL v2.0 ===</div>
            <div>Status: System gotowy. Zakładki aktywne.</div>
            <br>
        </div>
        <div class="input-area">
            <span style="margin-right:10px; font-weight:bold">admin@pink-dev:></span>
            <input type="text" id="commandInput" autocomplete="off">
        </div>
    </div>

    <div id="elektro-section" class="content-section">
        <div class="info-card">
            <h2 style="text-align:center; color:white;">SPECYFIKACJA ELEKTRO-INFO</h2>
            <div class="info-line">Karta Graficzna: NVIDIA GeForce RTX 3060</div>
            <div class="info-line">Płyta Główna: Gigabyte (BIOS: DEL)</div>
            <div class="info-line">Smartfon: Xiaomi 17</div>
            <div class="info-line">Użytkownik: Dejw_Devo1</div>
            <div class="info-line">System: Pink OS For Fun</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const terminal = document.getElementById('terminal');

        function initSystem() {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('terminal-section').style.display = 'flex';
            input.focus();
        }

        function showSection(sectionId, btn) {
            // Ukryj wszystkie sekcje
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            // Usuń klasę active z przycisków
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Pokaż wybraną
            document.getElementById(sectionId).style.display = 'flex';
            btn.classList.add('active');
            
            if(sectionId === 'terminal-section') input.focus();
        }

        // Obsługa komend terminala (skrócona dla czytelności)
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = input.value;
                const line = document.createElement('div');
                line.textContent = `admin@pink-dev:> ${val}`;
                terminal.appendChild(line);
                
                // Tutaj możesz dopisać resztę logiki (Antivirus, chat itp.)
                
                input.value = '';
                terminal.scrollTop = terminal.scrollHeight;
            }
        });
    </script>
</body>
</html>
