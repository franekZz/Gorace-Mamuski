<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorące Mamuśki - System v2.4</title>
    <style>
        :root {
            --bg-color: #1a000d;
            --text-color: #ff66cc;
            --input-bg: #2b0016;
            --border-color: #ff3399;
            --output-color: #ffffff;
            --neon-blue: #00ffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden;
        }

        /* --- MENU ZAKŁADEK (Tylko na stronie głównej/elektro) --- */
        #nav-bar {
            display: flex;
            background: #2b0016;
            border-bottom: 2px solid var(--border-color);
            justify-content: flex-start;
        }

        .tab-btn {
            background: transparent; border: none;
            color: var(--text-color); padding: 15px 25px;
            cursor: pointer; font-family: inherit; font-weight: bold;
            transition: 0.3s; border-right: 1px solid var(--border-color);
        }

        .tab-btn:hover, .tab-btn.active {
            background: var(--border-color); color: white;
        }

        /* --- PASEK NEON BLUE --- */
        #info-bar {
            display: block;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--neon-blue);
            padding: 10px 20px;
            font-size: 1rem;
            color: var(--neon-blue);
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-blue), 0 0 10px var(--neon-blue);
        }

        /* --- STRONA GŁÓWNA --- */
        #home-page {
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: calc(100vh - 95px); text-align: center;
        }

        .start-btn {
            background: transparent; border: 3px solid var(--border-color);
            color: var(--text-color); padding: 15px 40px; font-size: 1.5rem;
            cursor: pointer; box-shadow: 0 0 15px var(--border-color);
            font-family: inherit; font-weight: bold;
        }

        /* --- KONTENERY TREŚCI --- */
        .content-section {
            display: none; height: 100vh; /* Terminal zajmuje całość */
            padding: 20px; box-sizing: border-box;
            flex-direction: column;
        }

        #terminal-section {
            height: 100vh; /* Terminal na cały ekran */
        }

        #terminal {
            border: 2px solid var(--border-color); flex-grow: 1;
            padding: 15px; overflow-y: auto; background: rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .input-area {
            display: flex; background: var(--input-bg);
            padding: 10px; border: 1px solid var(--border-color);
        }

        input {
            background: transparent; border: none; color: var(--text-color);
            font-family: inherit; font-size: 16px; outline: none; flex-grow: 1;
        }

        .info-card {
            border: 2px solid var(--border-color);
            padding: 30px; background: rgba(255, 102, 204, 0.05);
            max-width: 600px; margin: 40px auto;
        }
    </style>
</head>
<body>

    <div id="nav-bar">
        <button class="tab-btn active" onclick="showHome()">HOME</button>
        <button class="tab-btn" onclick="showSection('elektro-section')">ELEKTRO-INFO</button>
        <button class="tab-btn" onclick="window.location.href='cheaty.html'">CHEATY</button>
    </div>

    <div id="info-bar">
        ElektroInfo Tak to My ale Zmieniliśmy Adres strony
    </div>

    <div id="home-page">
        <h1 style="font-size: 3rem; text-shadow: 0 0 20px var(--border-color);">GORĄCE MAMUŚKI</h1>
        <button class="start-btn" onclick="openTerminalFull()">Otwórz terminal</button>
    </div>

    <div id="terminal-section" class="content-section">
        <div id="terminal">
            <div style="color:white; font-weight: bold;">=== GORĄCE MAMUŚKI PINK TERMINAL v2.4 ===</div>
            <div>Status: Zakładki ukryte. Tryb pełnoekranowy aktywny.</div>
            <br>
        </div>
        <div class="input-area">
            <span style="margin-right:10px; font-weight:bold">admin@pink-dev:></span>
            <input type="text" id="commandInput" autocomplete="off">
        </div>
    </div>

    <div id="elektro-section" class="content-section" style="height: auto;">
        <div class="info-card">
            <h2 style="text-align:center; color:white;">SPECYFIKACJA ELEKTRO-INFO</h2>
            <div style="margin: 10px 0;">Karta: NVIDIA GeForce RTX 3060</div>
            <div style="margin: 10px 0;">Płyta: Gigabyte (DEL)</div>
            <div style="margin: 10px 0;">Xiaomi: 17</div>
            <div style="margin: 10px 0;">User: Dejw_Devo1</div>
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const terminal = document.getElementById('terminal');
        const nav = document.getElementById('nav-bar');
        const info = document.getElementById('info-bar');

        function openTerminalFull() {
            // Ukrywamy wszystko poza terminalem
            document.getElementById('home-page').style.display = 'none';
            nav.style.display = 'none';
            info.style.display = 'none';
            
            document.getElementById('terminal-section').style.display = 'flex';
            input.focus();
        }

        function showSection(sectionId) {
            document.getElementById('home-page').style.display = 'none';
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            
            document.getElementById(sectionId).style.display = 'flex';
            // W Elektro-Info zostawiamy menu
            nav.style.display = 'flex';
            info.style.display = 'block';
        }

        function showHome() {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById('home-page').style.display = 'flex';
            nav.style.display = 'flex';
            info.style.display = 'block';
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = input.value;
                if(val.trim() !== "") {
                    const line = document.createElement('div');
                    line.textContent = `admin@pink-dev:> ${val}`;
                    terminal.appendChild(line);
                    input.value = '';
                    terminal.scrollTop = terminal.scrollHeight;
                }
            }
        });
    </script>
</body>
</html>
