<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gorące Mamuśki - HUB v6.7</title>
    <style>
        :root {
            --bg-main: #1a000d;
            --pink-accent: #ff66cc;
            --neon-blue: #00d2ff;
            --border-pink: #ff3399;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-main); color: var(--pink-accent);
            display: flex;
            flex-direction: column;
        }

        /* --- NAWIGACJA --- */
        nav {
            background: #000;
            padding: 20px;
            border-bottom: 2px solid var(--border-pink);
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        nav a {
            color: var(--pink-accent);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: none; /* Wyłączone wymuszanie wielkich liter */
        }

        nav a:hover {
            color: white;
            text-shadow: 0 0 10px var(--border-pink);
        }

        /* --- PASEK INFO --- */
        .info-bar {
            text-align: center;
            padding: 10px 0;
            font-size: 1rem;
            color: var(--neon-blue);
            background: rgba(0, 0, 0, 0.4);
            font-weight: bold;
        }

        /* --- TREŚĆ GŁÓWNA --- */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            text-shadow: 0 0 20px var(--border-pink);
            letter-spacing: 5px;
        }

        .hero p {
            color: white;
            font-size: 1.5rem;
            margin-top: 15px;
            font-weight: 500;
        }

        /* --- PRZYCISK ORYGINALNOŚCI --- */
        .cert-btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            border-radius: 5px;
        }

        .cert-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

    </style>
</head>

    </div>

</body>
